name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/nubly/manifest.json'))['version'])")
          echo "tag=$TAG manifest=$MANIFEST_VERSION"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag v$TAG does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
